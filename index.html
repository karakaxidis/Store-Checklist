<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Store Checklist</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #4f46e5;
      --brand-light: #818cf8;
      --brand-dim: #1e1b4b;
      --bg: #0f0f1a;
      --surface: #16162a;
      --surface2: #1e1e35;
      --border: rgba(255,255,255,0.07);
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --green: #22c55e;
      --yellow: #f59e0b;
      --red: #ef4444;
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
      --radius: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 200;
      background: rgba(15,15,26,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
    }
    .header-inner {
      max-width: 960px; margin: 0 auto;
      display: flex; align-items: center; gap: 12px;
      height: 56px;
    }
    .logo {
      font-weight: 700; font-size: 16px; color: var(--text);
      display: flex; align-items: center; gap: 8px;
    }
    .logo-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--brand); display: grid; place-items: center;
      font-size: 16px;
    }
    .header-tabs {
      display: flex; gap: 4px; margin-left: auto;
    }
    .tab-btn {
      background: none; border: none; color: var(--muted);
      font-family: var(--font); font-size: 13px; font-weight: 500;
      padding: 6px 14px; border-radius: 8px; cursor: pointer;
      transition: all .2s;
    }
    .tab-btn.active, .tab-btn:hover { background: var(--surface2); color: var(--text); }
    .tab-btn.active { color: var(--brand-light); }

    /* ── VIEWS ── */
    .view { display: none; }
    .view.active { display: block; }
    .wrap { max-width: 960px; margin: 0 auto; padding: 24px 20px 120px; }

    /* ── PROGRESS BAR ── */
    .progress-strip {
      background: var(--surface); border-radius: 12px;
      padding: 16px 20px; margin-bottom: 20px;
      display: flex; align-items: center; gap: 16px;
      border: 1px solid var(--border);
    }
    .progress-track {
      flex: 1; height: 6px; background: var(--surface2);
      border-radius: 999px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--brand), var(--brand-light));
      border-radius: 999px; transition: width .4s ease;
    }
    .progress-label {
      font-family: var(--mono); font-size: 13px; color: var(--brand-light);
      white-space: nowrap;
    }

    /* ── META CARD ── */
    .meta-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
    }
    .meta-grid {
      display: grid; gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }
    label.field-label {
      font-size: 11px; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--muted);
      display: block; margin-bottom: 6px;
    }
    input[type=text], input[type=date], select, textarea {
      width: 100%; padding: 10px 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: var(--font); font-size: 14px;
      outline: none; transition: border-color .2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--brand);
    }
    select option { background: var(--surface2); }
    textarea { min-height: 72px; resize: vertical; }

    /* ── SECTION CARDS ── */
    .section-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 12px;
      overflow: hidden; transition: border-color .2s;
    }
    .section-card:has(.check-row input:checked) { border-color: rgba(79,70,229,.3); }

    .section-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; cursor: pointer;
      user-select: none;
    }
    .section-header:hover { background: rgba(255,255,255,.02); }
    .section-title {
      font-size: 14px; font-weight: 600; flex: 1;
    }
    .section-badge {
      font-family: var(--mono); font-size: 11px;
      background: var(--surface2); color: var(--muted);
      padding: 3px 8px; border-radius: 999px;
    }
    .section-badge.done { background: rgba(34,197,94,.15); color: var(--green); }
    .chevron {
      color: var(--muted); font-size: 12px;
      transition: transform .25s;
    }
    .section-body { display: none; border-top: 1px solid var(--border); }
    .section-card.open .section-body { display: block; }
    .section-card.open .chevron { transform: rotate(90deg); }

    /* ── CHECK ROW ── */
    .check-row {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      align-items: start; gap: 12px;
      padding: 11px 18px;
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    .check-row:last-child { border-bottom: none; }
    .check-row:hover { background: rgba(255,255,255,.02); }

    /* custom checkbox */
    .check-row input[type=checkbox] {
      width: 18px; height: 18px; cursor: pointer; accent-color: var(--brand);
      margin-top: 2px;
    }
    .check-row label {
      font-size: 14px; color: var(--text); cursor: pointer; line-height: 1.5;
    }
    .check-row input[type=checkbox]:checked + label { color: var(--muted); text-decoration: line-through; }

    .row-actions {
      display: flex; gap: 6px; align-items: center; flex-shrink: 0;
    }
    .icon-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 4px; border-radius: 6px;
      font-size: 14px; transition: all .15s; line-height: 1;
    }
    .icon-btn:hover { background: var(--surface2); color: var(--text); }
    .icon-btn.has-data { color: var(--brand-light); }

    /* ── COMMENT / PHOTO PANEL ── */
    .row-extra {
      grid-column: 2 / -1; display: none;
      flex-direction: column; gap: 8px;
      padding-bottom: 10px;
    }
    .row-extra.open { display: flex; }
    .extra-comment {
      width: 100%; padding: 8px 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: var(--font); font-size: 13px;
      resize: none; min-height: 58px; outline: none;
    }
    .extra-comment:focus { border-color: var(--brand); }
    .photo-strip { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .photo-thumb {
      width: 56px; height: 56px; border-radius: 8px;
      object-fit: cover; border: 1px solid var(--border);
      cursor: pointer;
    }
    .add-photo-btn {
      width: 56px; height: 56px; border-radius: 8px;
      border: 1px dashed var(--border); background: none;
      color: var(--muted); font-size: 22px; cursor: pointer;
      display: grid; place-items: center; transition: all .2s;
    }
    .add-photo-btn:hover { border-color: var(--brand); color: var(--brand-light); background: rgba(79,70,229,.07); }
    input[type=file] { display: none; }

    /* ── STICKY FOOTER ACTIONS ── */
    .sticky-footer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 150;
      background: rgba(15,15,26,0.92);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
    }
    .footer-inner {
      max-width: 960px; margin: 0 auto;
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    }
    .btn {
      border: none; border-radius: 10px; padding: 9px 16px;
      font-family: var(--font); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-ghost { background: var(--surface2); color: var(--text); }
    .btn-ghost:hover { background: #2a2a45; }
    .btn-green { background: rgba(34,197,94,.15); color: var(--green); }
    .btn-green:hover { background: rgba(34,197,94,.25); }
    .btn-yellow { background: rgba(245,158,11,.12); color: var(--yellow); }
    .btn-yellow:hover { background: rgba(245,158,11,.22); }
    .btn-red { background: rgba(239,68,68,.12); color: var(--red); }
    .btn-red:hover { background: rgba(239,68,68,.22); }
    .spacer { flex: 1; }

    /* ── HISTORY VIEW ── */
    .history-empty {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .history-empty .big { font-size: 48px; margin-bottom: 12px; }
    .history-list { display: flex; flex-direction: column; gap: 10px; }
    .history-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px;
      display: flex; align-items: center; gap: 14px;
    }
    .history-item:hover { border-color: rgba(79,70,229,.3); }
    .h-score {
      font-family: var(--mono); font-size: 13px;
      padding: 4px 10px; border-radius: 8px;
      background: var(--surface2); color: var(--brand-light);
      white-space: nowrap;
    }
    .h-info { flex: 1; }
    .h-title { font-weight: 600; font-size: 14px; }
    .h-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .h-actions { display: flex; gap: 6px; }

    /* ── EMAIL MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
      display: none; place-items: center; padding: 20px;
    }
    .modal-overlay.open { display: grid; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 28px; width: 100%; max-width: 480px;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp {
      from { opacity:0; transform: translateY(16px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .modal h2 { font-size: 18px; margin-bottom: 18px; }
    .modal-field { margin-bottom: 14px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 20px; }

    /* ── PHOTO LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,.9); display: none;
      place-items: center; cursor: pointer;
    }
    .lightbox.open { display: grid; }
    .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 12px; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-size: 13px; font-weight: 500;
      padding: 10px 18px; border-radius: 999px;
      opacity: 0; pointer-events: none;
      transition: opacity .3s; z-index: 500;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    @media print {
      header, .sticky-footer, .row-actions, .modal-overlay, .toast { display: none !important; }
      body { background: #fff; color: #000; }
      .section-card { border: 1px solid #ddd; }
      .section-body { display: block !important; }
    }
    @media (max-width: 600px) {
      .meta-grid { grid-template-columns: 1fr 1fr; }
      .footer-inner { gap: 6px; }
      .btn { padding: 8px 12px; font-size: 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">✓</div>
      Store Checklist
    </div>
    <nav class="header-tabs">
      <button class="tab-btn active" onclick="showView('checklist')">Έλεγχος</button>
      <button class="tab-btn" onclick="showView('history')">Ιστορικό</button>
    </nav>
  </div>
</header>

<!-- ══════════ CHECKLIST VIEW ══════════ -->
<div id="view-checklist" class="view active">
  <div class="wrap">

    <div class="progress-strip">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <span class="progress-label" id="progressLabel">0 / 0</span>
    </div>

    <div class="meta-card">
      <div class="meta-grid">
        <div>
          <label class="field-label">Κατάστημα</label>
          <input type="text" id="store" placeholder="π.χ. Ελαιών">
        </div>
        <div>
          <label class="field-label">Ημερομηνία</label>
          <input type="date" id="date">
        </div>
        <div>
          <label class="field-label">Υπεύθυνος</label>
          <input type="text" id="auditor" placeholder="Ονοματεπώνυμο">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div>
            <label class="field-label">Βάρδια</label>
            <select id="shift">
              <option value="">—</option>
              <option>Πρωινή</option>
              <option>Μεσημεριανή</option>
              <option>Απογευματινή</option>
            </select>
          </div>
          <div>
            <label class="field-label">Ώρα</label>
            <input type="text" id="time" placeholder="07:30">
          </div>
        </div>
        <div style="grid-column: 1 / -1">
          <label class="field-label">Γενικές Παρατηρήσεις</label>
          <textarea id="notes" placeholder="Σύντομες σημειώσεις..."></textarea>
        </div>
      </div>
    </div>

    <div id="sections"></div>
  </div>
</div>

<!-- ══════════ HISTORY VIEW ══════════ -->
<div id="view-history" class="view">
  <div class="wrap">
    <div id="historyList"></div>
  </div>
</div>

<!-- ══════════ STICKY ACTIONS ══════════ -->
<div class="sticky-footer">
  <div class="footer-inner">
    <button class="btn btn-ghost" onclick="toggleAll(true)">Επιλογή όλων</button>
    <button class="btn btn-ghost" onclick="toggleAll(false)">Αποεπιλογή</button>
    <div class="spacer"></div>
    <button class="btn btn-green" onclick="saveLocal()">💾 Αποθήκευση</button>
    <button class="btn btn-primary" onclick="exportCSV()">📊 CSV</button>
    <button class="btn btn-primary" onclick="openEmailModal()">✉️ Email</button>
    <button class="btn btn-yellow" onclick="window.print()">🖨️ Print</button>
    <button class="btn btn-red" onclick="clearAll()">🗑️ Καθαρισμός</button>
  </div>
</div>

<!-- ══════════ EMAIL MODAL ══════════ -->
<div class="modal-overlay" id="emailModal" onclick="closeEmailModal(event)">
  <div class="modal">
    <h2>✉️ Αποστολή με Email</h2>
    <div class="modal-field">
      <label class="field-label">Παραλήπτης</label>
      <input type="text" id="emailTo" placeholder="email@example.com">
    </div>
    <div class="modal-field">
      <label class="field-label">Θέμα</label>
      <input type="text" id="emailSubject" placeholder="Αναφορά ελέγχου">
    </div>
    <p style="font-size:13px;color:var(--muted);line-height:1.6">
      Θα ανοίξει ο email client σας με προ-συμπληρωμένα στοιχεία ελέγχου.
    </p>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="sendEmail()">Άνοιγμα Email</button>
      <button class="btn btn-ghost" onclick="closeEmailModal()">Άκυρο</button>
    </div>
  </div>
</div>

<!-- ══════════ LIGHTBOX ══════════ -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="">
</div>

<div class="toast" id="toast"></div>

<script>
if ('serviceWorker' in navigator) {

}

    "Δεν υπάρχουν προϊόντα πάνω σε ηλεκτρικά σημεία"
  ]},
  { title: "9. Παραλαβές", items: [
    "Χώρος παραλαβών καθαρός, οργανωμένος, προσβάσιμος",
    "Παλετοφόρα, καρότσια διαθέσιμα και λειτουργικά",
    "Ζυγαριές λειτουργικές",
    "Παραλαβές γίνονται εντός χρονικών ορίων",
    "Τηρούνται τα ραντεβού παραδόσεων & σειρά προτεραιότητας",
    "Αλυσίδα ψύξης διατηρείται (ευπαθή προϊόντα)",
    "Καταγραφή θερμοκρασιών όπου απαιτείται",
    "Προϊόντα συμφωνούν με παραστατικά",
    "Δεν υπάρχουν αλλοιωμένα ή εκτός προδιαγραφών είδη"
  ]},
  { title: "10. Αποθήκη", items: [
    "Προϊόντα ταξινομημένα σωστά",
    "Στοκ εντός ορίων",
    "Καθαριότητα σε ράφια, δάπεδα, διαδρόμους",
    "Δεν υπάρχουν προϊόντα στο πάτωμα (εκτός παλετών)",
    "Ψυγεία/καταψύκτες λειτουργούν & καταγράφονται",
    "Όχι ληγμένα, ξεχασμένα ή κατεστραμμένα προϊόντα",
    "Χημικά / εύφλεκτα σε ειδικούς χώρους",
    "Περάσματα ελεύθερα",
    "Σωστή αποθήκευση επιστροφών"
  ]}
];

/* ══ STATE ══ */
// rowExtras[sIndex][iIndex] = { comment:'', photos:[] }
let rowExtras = {};

function getExtra(sI, iI) {
  if (!rowExtras[sI]) rowExtras[sI] = {};
  if (!rowExtras[sI][iI]) rowExtras[sI][iI] = { comment:'', photos:[] };
  return rowExtras[sI][iI];
}

/* ══ RENDER ══ */
function render() {
  const el = document.getElementById('sections');
  el.innerHTML = '';
  CHECKLIST.forEach((sec, sI) => {
    const card = document.createElement('div');
    card.className = 'section-card' + (sI === 0 ? ' open' : '');
    card.id = `sec-${sI}`;

    card.innerHTML = `
      <div class="section-header" onclick="toggleSection(${sI})">
        <span class="section-title">${sec.title}</span>
        <span class="section-badge" id="badge-${sI}">0 / ${sec.items.length}</span>
        <span class="chevron">▶</span>
      </div>
      <div class="section-body" id="body-${sI}"></div>
    `;

    const body = card.querySelector(`#body-${sI}`);
    sec.items.forEach((item, iI) => {
      const id = `s${sI}i${iI}`;
      const row = document.createElement('div');
      row.className = 'check-row';
      row.innerHTML = `
        <input type="checkbox" id="${id}" onchange="onCheck(${sI},${iI})">
        <label for="${id}">${item}</label>
        <div class="row-actions">
          <button class="icon-btn" title="Σχόλιο" onclick="toggleExtra(${sI},${iI},'comment')">💬</button>
          <button class="icon-btn" title="Φωτογραφία" onclick="triggerPhoto(${sI},${iI})">📷</button>
          <input type="file" accept="image/*" id="photo-${sI}-${iI}" onchange="handlePhoto(event,${sI},${iI})">
        </div>
        <div class="row-extra" id="extra-${sI}-${iI}">
          <textarea class="extra-comment" placeholder="Σχόλιο για αυτό το σημείο..." rows="2"
            oninput="saveComment(${sI},${iI},this.value)"></textarea>
          <div class="photo-strip" id="photos-${sI}-${iI}">
            <button class="add-photo-btn" onclick="triggerPhoto(${sI},${iI})">+</button>
          </div>
        </div>
      `;
      body.appendChild(row);
    });

    el.appendChild(card);
  });

  restoreDraft();
  updateProgress();
}

function toggleSection(sI) {
  document.getElementById(`sec-${sI}`).classList.toggle('open');
}

/* ══ CHECK LOGIC ══ */
function onCheck(sI, iI) {
  updateProgress();
  persistDraft();
}

function updateProgress() {
  const all = document.querySelectorAll('#sections input[type=checkbox]');
  const checked = document.querySelectorAll('#sections input[type=checkbox]:checked');
  const t = all.length, c = checked.length;
  document.getElementById('progressLabel').textContent = `${c} / ${t}`;
  document.getElementById('progressFill').style.width = t ? `${(c/t)*100}%` : '0%';

  // per-section badges
  CHECKLIST.forEach((sec, sI) => {
    const secAll = document.querySelectorAll(`#body-${sI} input[type=checkbox]`);
    const secChk = document.querySelectorAll(`#body-${sI} input[type=checkbox]:checked`);
    const badge = document.getElementById(`badge-${sI}`);
    if (!badge) return;
    badge.textContent = `${secChk.length} / ${secAll.length}`;
    badge.className = 'section-badge' + (secChk.length === secAll.length && secAll.length > 0 ? ' done' : '');
  });
}

/* ══ EXTRAS (comment / photo) ══ */
function toggleExtra(sI, iI, focus) {
  const el = document.getElementById(`extra-${sI}-${iI}`);
  el.classList.toggle('open');
  if (focus === 'comment') el.querySelector('textarea')?.focus();
}

function saveComment(sI, iI, val) {
  getExtra(sI, iI).comment = val;
  const btn = document.querySelector(`#sec-${sI} .check-row:nth-child(${iI+1}) .icon-btn`);
  persistDraft();
}

function triggerPhoto(sI, iI) {
  document.getElementById(`photo-${sI}-${iI}`).click();
}

function handlePhoto(e, sI, iI) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const src = ev.target.result;
    getExtra(sI, iI).photos.push(src);
    renderPhotos(sI, iI);
    // open the panel
    document.getElementById(`extra-${sI}-${iI}`).classList.add('open');
    persistDraft();
    showToast('Φωτογραφία προστέθηκε ✓');
  };
  reader.readAsDataURL(file);
}

function renderPhotos(sI, iI) {
  const strip = document.getElementById(`photos-${sI}-${iI}`);
  const photos = getExtra(sI, iI).photos;
  // keep add button
  strip.innerHTML = '';
  photos.forEach((src, pi) => {
    const img = document.createElement('img');
    img.className = 'photo-thumb';
    img.src = src;
    img.onclick = () => openLightbox(src);
    strip.appendChild(img);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'add-photo-btn';
  addBtn.textContent = '+';
  addBtn.onclick = () => triggerPhoto(sI, iI);
  strip.appendChild(addBtn);

  // mark camera btn
  const cameraBtn = strip.closest('.check-row')?.querySelectorAll('.icon-btn')[1];
  if (cameraBtn) cameraBtn.classList.toggle('has-data', photos.length > 0);
}

/* ══ PERSIST ══ */
function persistDraft() {
  const checks = Array.from(document.querySelectorAll('#sections input[type=checkbox]')).map(c => c.checked);
  const comments = {};
  document.querySelectorAll('.extra-comment').forEach((ta, idx) => {
    if (ta.value) comments[idx] = ta.value;
  });
  localStorage.setItem('storeChecklist_v2', JSON.stringify({
    store: document.getElementById('store').value,
    date: document.getElementById('date').value,
    auditor: document.getElementById('auditor').value,
    shift: document.getElementById('shift').value,
    time: document.getElementById('time').value,
    notes: document.getElementById('notes').value,
    checks,
    rowExtras
  }));
}

function restoreDraft() {
  try {
    const raw = localStorage.getItem('storeChecklist_v2');
    if (!raw) return;
    const d = JSON.parse(raw);
    document.getElementById('store').value = d.store || '';
    document.getElementById('date').value = d.date || '';
    document.getElementById('auditor').value = d.auditor || '';
    document.getElementById('shift').value = d.shift || '';
    document.getElementById('time').value = d.time || '';
    document.getElementById('notes').value = d.notes || '';
    const inputs = document.querySelectorAll('#sections input[type=checkbox]');
    (d.checks || []).forEach((v, i) => { if (inputs[i]) inputs[i].checked = !!v; });
    if (d.rowExtras) {
      rowExtras = d.rowExtras;
      Object.keys(rowExtras).forEach(sI => {
        Object.keys(rowExtras[sI]).forEach(iI => {
          const extra = rowExtras[sI][iI];
          const ta = document.querySelector(`#extra-${sI}-${iI} textarea`);
          if (ta && extra.comment) {
            ta.value = extra.comment;
            document.getElementById(`extra-${sI}-${iI}`).classList.add('open');
          }
          if (extra.photos && extra.photos.length) renderPhotos(+sI, +iI);
        });
      });
    }
  } catch(e) {}
}

/* ══ ACTIONS ══ */
function toggleAll(flag) {
  document.querySelectorAll('#sections input[type=checkbox]').forEach(c => c.checked = flag);
  updateProgress(); persistDraft();
}

function saveLocal() {
  persistDraft();
  // save snapshot to history
  saveToHistory();
  showToast('Αποθηκεύτηκε ✓');
}

function saveToHistory() {
  const total = document.querySelectorAll('#sections input[type=checkbox]').length;
  const checked = document.querySelectorAll('#sections input[type=checkbox]:checked').length;
  const store = document.getElementById('store').value || '—';
  const date = document.getElementById('date').value || new Date().toISOString().slice(0,10);
  const auditor = document.getElementById('auditor').value || '—';
  const shift = document.getElementById('shift').value || '—';
  const notes = document.getElementById('notes').value || '';
  const checks = Array.from(document.querySelectorAll('#sections input[type=checkbox]')).map(c => c.checked);

  const hist = getHistory();
  hist.unshift({ id: Date.now(), store, date, auditor, shift, notes, checked, total, checks, rowExtras: JSON.parse(JSON.stringify(rowExtras)) });
  if (hist.length > 30) hist.pop();
  localStorage.setItem('storeChecklist_history', JSON.stringify(hist));
}

function getHistory() {
  try { return JSON.parse(localStorage.getItem('storeChecklist_history') || '[]'); } catch(e) { return []; }
}

function renderHistory() {
  const hist = getHistory();
  const el = document.getElementById('historyList');
  if (!hist.length) {
    el.innerHTML = `<div class="history-empty"><div class="big">📋</div><p>Δεν υπάρχουν αποθηκευμένοι έλεγχοι ακόμα.<br>Αποθηκεύστε έναν έλεγχο για να εμφανιστεί εδώ.</p></div>`;
    return;
  }
  el.innerHTML = hist.map(h => `
    <div class="history-item">
      <span class="h-score">${h.checked}/${h.total}</span>
      <div class="h-info">
        <div class="h-title">${h.store} — ${h.shift}</div>
        <div class="h-meta">${h.date} · ${h.auditor}</div>
      </div>
      <div class="h-actions">
        <button class="btn btn-ghost" style="font-size:12px" onclick="loadHistory(${h.id})">Φόρτωση</button>
        <button class="btn btn-red" style="font-size:12px" onclick="deleteHistory(${h.id})">✕</button>
      </div>
    </div>
  `).join('');
}

function loadHistory(id) {
  const h = getHistory().find(x => x.id === id);
  if (!h) return;
  document.getElementById('store').value = h.store;
  document.getElementById('date').value = h.date;
  document.getElementById('auditor').value = h.auditor;
  document.getElementById('shift').value = h.shift;
  document.getElementById('notes').value = h.notes || '';
  const inputs = document.querySelectorAll('#sections input[type=checkbox]');
  (h.checks || []).forEach((v, i) => { if (inputs[i]) inputs[i].checked = !!v; });
  if (h.rowExtras) {
    rowExtras = h.rowExtras;
    Object.keys(rowExtras).forEach(sI => {
      Object.keys(rowExtras[sI]).forEach(iI => {
        const extra = rowExtras[sI][iI];
        const ta = document.querySelector(`#extra-${sI}-${iI} textarea`);
        if (ta && extra.comment) { ta.value = extra.comment; document.getElementById(`extra-${sI}-${iI}`).classList.add('open'); }
        if (extra.photos && extra.photos.length) renderPhotos(+sI, +iI);
      });
    });
  }
  updateProgress();
  showView('checklist');
  showToast('Ο έλεγχος φορτώθηκε ✓');
}

function deleteHistory(id) {
  const hist = getHistory().filter(x => x.id !== id);
  localStorage.setItem('storeChecklist_history', JSON.stringify(hist));
  renderHistory();
}

function clearAll() {
  if (!confirm('Καθαρισμός όλων των δεδομένων;')) return;
  document.querySelectorAll('#sections input[type=checkbox]').forEach(c => c.checked = false);
  document.querySelectorAll('.extra-comment').forEach(t => t.value = '');
  document.querySelectorAll('.row-extra').forEach(e => e.classList.remove('open'));
  rowExtras = {};
  ['store','auditor','time','notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('shift').value = '';
  document.getElementById('date').value = new Date().toISOString().slice(0,10);
  updateProgress();
  persistDraft();
  showToast('Καθαρίστηκε ✓');
}

/* ══ CSV EXPORT ══ */
function exportCSV() {
  const store = document.getElementById('store').value || 'store';
  const date = document.getElementById('date').value || new Date().toISOString().slice(0,10);
  const auditor = document.getElementById('auditor').value || '';
  const shift = document.getElementById('shift').value || '';
  const time = document.getElementById('time').value || '';
  const notes = document.getElementById('notes').value || '';

  const rows = [['Τμήμα','Σημείο Ελέγχου','Κατάσταση','Σχόλιο']];
  let idx = 0;
  CHECKLIST.forEach((sec, sI) => {
    sec.items.forEach((item, iI) => {
      const cb = document.querySelectorAll('#sections input[type=checkbox]')[idx++];
      const comment = getExtra(sI, iI).comment || '';
      rows.push([sec.title, item, cb?.checked ? '✓' : '✗', comment]);
    });
  });

  const total = document.querySelectorAll('#sections input[type=checkbox]').length;
  const checked = document.querySelectorAll('#sections input[type=checkbox]:checked').length;
  rows.push(['','','','']);
  rows.push(['Σύνολο', `${checked}/${total}`, `${Math.round(checked/total*100)}%`, notes]);

  const bom = '\uFEFF';
  const csv = bom + rows.map(r => r.map(x => `"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `check_${store.replace(/\s+/g,'_')}_${date}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast('CSV εξάχθηκε ✓');
}

/* ══ EMAIL ══ */
function openEmailModal() {
  const store = document.getElementById('store').value || 'Κατάστημα';
  const date = document.getElementById('date').value || '';
  document.getElementById('emailSubject').value = `Αναφορά Ελέγχου – ${store} ${date}`;
  document.getElementById('emailModal').classList.add('open');
}
function closeEmailModal(e) {
  if (!e || e.target === document.getElementById('emailModal')) {
    document.getElementById('emailModal').classList.remove('open');
  }
}
function sendEmail() {
  const to = document.getElementById('emailTo').value;
  const subject = encodeURIComponent(document.getElementById('emailSubject').value);

  const store = document.getElementById('store').value || '—';
  const date = document.getElementById('date').value || '—';
  const auditor = document.getElementById('auditor').value || '—';
  const shift = document.getElementById('shift').value || '—';
  const total = document.querySelectorAll('#sections input[type=checkbox]').length;
  const checked = document.querySelectorAll('#sections input[type=checkbox]:checked').length;
  const notes = document.getElementById('notes').value || '—';

  let body = `ΑΝΑΦΟΡΑ ΕΛΕΓΧΟΥ ΚΑΤΑΣΤΗΜΑΤΟΣ\n`;
  body += `============================\n`;
  body += `Κατάστημα: ${store}\n`;
  body += `Ημερομηνία: ${date}\n`;
  body += `Υπεύθυνος: ${auditor}\n`;
  body += `Βάρδια: ${shift}\n`;
  body += `Αποτέλεσμα: ${checked}/${total} (${Math.round(checked/total*100)}%)\n`;
  body += `Παρατηρήσεις: ${notes}\n\n`;

  let idx = 0;
  CHECKLIST.forEach(sec => {
    body += `\n${sec.title}\n`;
    sec.items.forEach(item => {
      const cb = document.querySelectorAll('#sections input[type=checkbox]')[idx++];
      body += `  ${cb?.checked ? '[✓]' : '[ ]'} ${item}\n`;
    });
  });

  window.location.href = `mailto:${to}?subject=${subject}&body=${encodeURIComponent(body)}`;
  closeEmailModal();
}

/* ══ LIGHTBOX ══ */
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

/* ══ TOAST ══ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ══ VIEW SWITCHER ══ */
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(`view-${name}`).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['checklist','history'][i] === name);
  });
  if (name === 'history') renderHistory();
}

/* ══ INIT ══ */
document.getElementById('date').value = new Date().toISOString().slice(0,10);
render();
</script>
